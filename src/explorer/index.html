<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>mii-memory explorer</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0f1115;
    --panel: #161a22;
    --panel-2: #1c2230;
    --border: #2a3142;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #6ea8ff;
    --tag-bg: #233149;
    --tag-text: #b8cdff;
    --positive: #6ddf9d;
    --negative: #ff8a8a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  header h1 {
    font-size: 1.05rem;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  header .status {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  header .dot {
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 50%;
    background: #6ddf9d;
    box-shadow: 0 0 0.4rem #6ddf9d99;
  }
  header .dot.offline { background: #ff8a8a; box-shadow: 0 0 0.4rem #ff8a8a99; }
  main {
    display: grid;
    grid-template-columns: 18rem 1fr;
    min-height: calc(100vh - 3rem);
  }
  aside {
    padding: 1rem;
    border-right: 1px solid var(--border);
    background: var(--panel);
  }
  aside h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin: 1.25rem 0 0.5rem;
  }
  aside h2:first-child { margin-top: 0; }
  input[type="text"], select {
    width: 100%;
    padding: 0.5rem 0.6rem;
    border-radius: 0.4rem;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    font: inherit;
  }
  input[type="text"]:focus, select:focus { outline: 1px solid var(--accent); }
  .tag-list {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    max-height: 50vh;
    overflow-y: auto;
  }
  .tag-list button {
    text-align: left;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    padding: 0.3rem 0.5rem;
    border-radius: 0.3rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    font: inherit;
  }
  .tag-list button:hover { background: var(--panel-2); }
  .tag-list button.active { background: var(--tag-bg); color: var(--tag-text); border-color: var(--accent); }
  .tag-list .count { color: var(--muted); font-size: 0.8rem; }
  section.results {
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    overflow-y: auto;
  }
  .memory {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .memory header {
    background: transparent;
    border: none;
    padding: 0;
    position: static;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
  }
  .memory .meta {
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .memory .content { white-space: pre-wrap; line-height: 1.4; }
  .memory .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    padding: 0.1rem 0.5rem;
    border-radius: 999px;
    font-size: 0.75rem;
  }
  .scores { display: flex; gap: 0.75rem; font-size: 0.78rem; }
  .scores .pos { color: var(--positive); }
  .scores .neg { color: var(--negative); }
  .empty { color: var(--muted); text-align: center; margin-top: 2rem; }
  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem;
    margin-top: 0.5rem;
  }
  .selected-tags .tag {
    cursor: pointer;
  }
  .selected-tags .tag::after { content: " ×"; opacity: 0.6; }
  details > summary {
    cursor: pointer;
    color: var(--muted);
    font-size: 0.78rem;
  }
  pre.metadata {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 0.4rem;
    padding: 0.5rem;
    font-size: 0.75rem;
    overflow-x: auto;
    margin: 0.3rem 0 0;
  }
</style>
</head>
<body>
<header>
  <h1>mii-memory explorer</h1>
  <div class="status"><span id="status-dot" class="dot"></span><span id="status-text">connecting…</span></div>
</header>
<main>
  <aside>
    <h2>Search</h2>
    <input id="text-filter" type="text" placeholder="content, tag or metadata…" autocomplete="off" />
    <h2>Mode</h2>
    <select id="mode-filter">
      <option value="">all modes</option>
      <option value="global">global</option>
      <option value="workspace">workspace</option>
      <option value="session">session</option>
    </select>
    <h2>Tags</h2>
    <input id="tag-filter" type="text" placeholder="filter tags…" autocomplete="off" />
    <div class="selected-tags" id="selected-tags"></div>
    <div class="tag-list" id="tag-list"></div>
  </aside>
  <section class="results" id="results">
    <p class="empty">loading…</p>
  </section>
</main>
<script>
  const state = {
    text: "",
    mode: "",
    selectedTags: new Set(),
    tagFilter: "",
  };

  const elements = {
    textFilter: document.getElementById("text-filter"),
    modeFilter: document.getElementById("mode-filter"),
    tagFilter: document.getElementById("tag-filter"),
    selectedTags: document.getElementById("selected-tags"),
    tagList: document.getElementById("tag-list"),
    results: document.getElementById("results"),
    statusDot: document.getElementById("status-dot"),
    statusText: document.getElementById("status-text"),
  };

  const debounced = (fn, delay) => {
    let handle;
    return (...args) => {
      clearTimeout(handle);
      handle = setTimeout(() => fn(...args), delay);
    };
  };

  const refresh = debounced(async () => {
    await Promise.all([loadTags(), loadMemories()]);
  }, 120);

  const setStatus = (online, text) => {
    elements.statusDot.classList.toggle("offline", !online);
    elements.statusText.textContent = text;
  };

  const escape = (text) => text.replace(/[&<>"']/g, (character) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#39;",
  }[character]));

  const renderSelectedTags = () => {
    elements.selectedTags.innerHTML = "";
    for (const tag of state.selectedTags) {
      const node = document.createElement("span");
      node.className = "tag";
      node.textContent = tag;
      node.title = "remove from filter";
      node.addEventListener("click", () => {
        state.selectedTags.delete(tag);
        renderSelectedTags();
        refresh();
      });
      elements.selectedTags.appendChild(node);
    }
  };

  const renderTags = (tags) => {
    elements.tagList.innerHTML = "";
    for (const tag of tags) {
      const node = document.createElement("button");
      node.type = "button";
      node.dataset.tag = tag.tag;
      node.classList.toggle("active", state.selectedTags.has(tag.tag));
      node.innerHTML = `<span>${escape(tag.tag)}</span><span class="count">${tag.count}</span>`;
      node.addEventListener("click", () => {
        if (state.selectedTags.has(tag.tag)) {
          state.selectedTags.delete(tag.tag);
        } else {
          state.selectedTags.add(tag.tag);
        }
        renderSelectedTags();
        refresh();
      });
      elements.tagList.appendChild(node);
    }
  };

  const renderMemories = (memories) => {
    elements.results.innerHTML = "";
    if (memories.length === 0) {
      const empty = document.createElement("p");
      empty.className = "empty";
      empty.textContent = "no memories match the current filters";
      elements.results.appendChild(empty);
      return;
    }
    for (const memory of memories) {
      const card = document.createElement("article");
      card.className = "memory";

      const head = document.createElement("header");
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `
        <span>#${memory.id}</span>
        <span>${escape(memory.mode)}${memory.mode_ref ? `/${escape(memory.mode_ref)}` : ""}</span>
        <span>created ${new Date(memory.created_at).toLocaleString()}</span>
        <span>usage ${memory.usage_count}</span>
        ${memory.expiration_condition ? `<span>exp: ${escape(memory.expiration_condition)} = ${escape(memory.expiration_value || "")}</span>` : ""}
      `;
      const scores = document.createElement("div");
      scores.className = "scores";
      scores.innerHTML = `
        <span class="pos">+${memory.positive_score.toFixed(2)}</span>
        <span class="neg">-${memory.negative_score.toFixed(2)}</span>
      `;
      head.appendChild(meta);
      head.appendChild(scores);

      const content = document.createElement("div");
      content.className = "content";
      content.textContent = memory.content;

      const tags = document.createElement("div");
      tags.className = "tags";
      for (const tag of memory.tags) {
        const node = document.createElement("span");
        node.className = "tag";
        node.textContent = tag;
        tags.appendChild(node);
      }

      card.appendChild(head);
      card.appendChild(content);
      if (memory.tags.length > 0) card.appendChild(tags);

      if (memory.metadata) {
        const details = document.createElement("details");
        const summary = document.createElement("summary");
        summary.textContent = "metadata";
        const pre = document.createElement("pre");
        pre.className = "metadata";
        pre.textContent = memory.metadata;
        details.appendChild(summary);
        details.appendChild(pre);
        card.appendChild(details);
      }

      elements.results.appendChild(card);
    }
  };

  const loadMemories = async () => {
    const params = new URLSearchParams();
    if (state.text) params.set("text", state.text);
    if (state.mode) params.set("mode", state.mode);
    for (const tag of state.selectedTags) params.append("tag", tag);
    const response = await fetch(`/api/memories?${params.toString()}`);
    if (!response.ok) return;
    const data = await response.json();
    renderMemories(data.memories);
  };

  const loadTags = async () => {
    const params = new URLSearchParams();
    if (state.tagFilter) params.set("filter", state.tagFilter);
    const response = await fetch(`/api/tags?${params.toString()}`);
    if (!response.ok) return;
    const data = await response.json();
    renderTags(data.tags);
  };

  elements.textFilter.addEventListener("input", (event) => {
    state.text = event.target.value;
    refresh();
  });
  elements.modeFilter.addEventListener("change", (event) => {
    state.mode = event.target.value;
    refresh();
  });
  elements.tagFilter.addEventListener("input", (event) => {
    state.tagFilter = event.target.value;
    loadTags();
  });

  const connect = () => {
    const events = new EventSource("/api/events");
    events.addEventListener("update", () => {
      refresh();
    });
    events.addEventListener("ready", () => {
      setStatus(true, "live");
    });
    events.onerror = () => {
      setStatus(false, "reconnecting…");
      events.close();
      setTimeout(connect, 1500);
    };
  };

  refresh();
  connect();
</script>
</body>
</html>
